name: Refresh Version Availability Report

on:
  schedule:
    # Daily at 00:00 UTC (08:00 Beijing time)
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Manual trigger from GitHub UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Refresh Report
        env:
          OPENLIBING_COOKIE: ${{ secrets.OPENLIBING_COOKIE }}
          OPENLIBING_CSRF_TOKEN: ${{ secrets.OPENLIBING_CSRF_TOKEN }}
        run: bash scripts/va-refresh-ci.sh
