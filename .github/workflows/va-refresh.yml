name: Refresh Version Availability Report

on:
  workflow_dispatch:
    inputs:
      cookie:
        description: 'Browser Cookie (full string from DevTools → Request Headers)'
        required: true
        type: string
      csrf_token:
        description: 'CSRF Token (Csrf-Token-Open-Li-Bing header value)'
        required: true
        type: string

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Refresh Report
        env:
          OPENLIBING_COOKIE: ${{ inputs.cookie }}
          OPENLIBING_CSRF_TOKEN: ${{ inputs.csrf_token }}
        run: bash scripts/va-refresh-ci.sh
