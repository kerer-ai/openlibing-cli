name: version-availability
version: "1.0"
description: >
  Query nightly pipeline version availability metrics.
  Omit --project-id to query all projects.
type: query
category: ops
tags: [version, availability, nightly, metrics]

parameters:
  - name: project_id
    type: integer
    required: false
    default: ""
    description: GitCode project ID (omit to query all projects)

  - name: start_date
    type: string
    required: true
    description: Start date in YYYY-MM-DD format

  - name: end_date
    type: string
    required: true
    description: End date in YYYY-MM-DD format

  - name: category
    type: string
    default: "nightly-dashboard"
    description: Dashboard category

  - name: open_source
    type: string
    default: "lead"
    description: Open source filter

  - name: is_all_day
    type: string
    default: "0"
    description: All-day filter

  - name: sort_field
    type: string
    default: "pipelineRunCount"
    description: Sort field

  - name: sort_rule
    type: string
    default: "desc"
    enum: [asc, desc]
    description: Sort direction

  - name: page
    type: integer
    default: 1
    description: Page number

  - name: page_size
    type: integer
    default: 10
    description: Results per page
    validation:
      min: 1
      max: 100

source:
  method: POST
  endpoint: gateway/openlibing-ops/manage/common/detail
  headers:
    Content-Type: application/json
  body: |
    {"category":"{{.category}}","openSource":"{{.open_source}}","startDate":"{{.start_date}}","endDate":"{{.end_date}}","isAllDay":"{{.is_all_day}}","sortField":"{{.sort_field}}","sortRule":"{{.sort_rule}}","page":{{.page}},"pageSize":{{.page_size}}{{if .project_id}},"projectId":{{.project_id}}{{end}}}

output:
  format: table
  fields:
    - name: pipeline_name
      header: "Pipeline"
      path: "pipelineName"
      width: 35
    - name: project_id
      header: "ProjID"
      path: "projectId"
    - name: run_count
      header: "Runs"
      path: "pipelineRunCount"
    - name: success_rate
      header: "Success%"
      path: "pipelineSuccessRate"
    - name: version_avail
      header: "VersionAvail%"
      path: "versionAvailabilityRate"
    - name: build_success
      header: "Build%"
      path: "buildSuccessRate"
    - name: test_success
      header: "Test%"
      path: "testSuccessRate"
    - name: freq_per_day
      header: "Freq/Day"
      path: "runFrequencyPerDay"
    - name: dur_avg_min
      header: "DurAvg(m)"
      path: "actualDurationAvgMinutes"
      transform: truncate:8

ai:
  prompt_hint: >
    Use when users ask about version availability or nightly pipeline metrics.
    Omit project_id to query all projects across a date range.
  natural_language:
    - "show version availability for all projects this week"
    - "nightly pipeline metrics for project 300036"
    - "what's the version availability trend for MindIE-LLM"

examples:
  - command: |
      openlibing run version-availability \
        --start-date 2026-06-01 \
        --end-date 2026-06-22
    description: Query all projects for June 2026
  - command: |
      openlibing run version-availability \
        --project-id 300036 \
        --start-date 2026-06-01 \
        --end-date 2026-06-22
    description: Query project 300036 only
  - command: |
      openlibing run version-availability \
        --project-id 300036 \
        --start-date 2026-06-01 \
        --end-date 2026-06-07 \
        --output json
    description: Single week for trend analysis
