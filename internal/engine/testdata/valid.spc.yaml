name: pipeline-list
version: "1.0"
description: List pipeline runs
type: query
category: pipeline
tags: [ci]
parameters:
  - name: project_id
    type: string
    required: true
    description: Project ID
  - name: limit
    type: integer
    default: 10
    validation:
      min: 1
      max: 100
  - name: status
    type: string
    enum: [running, success, failed]
source:
  method: GET
  endpoint: /gateway/test
output:
  format: table
  fields:
    - name: id
      header: "ID"
      path: ".id"
